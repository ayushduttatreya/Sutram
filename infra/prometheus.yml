# infra/prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
  - job_name: workflow-service
    static_configs:
      - targets: ["workflow-service:8001"]
  - job_name: memory-service
    static_configs:
      - targets: ["memory-service:8002"]
  - job_name: observability-service
    static_configs:
      - targets: ["observability-service:8003"]
