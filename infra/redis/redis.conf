appendonly yes
appendfsync everysec
maxmemory 512mb
maxmemory-policy volatile-lru

# Logical database assignments:
# DB 0: general cache
# DB 1: streams (executions, memory.events)
# DB 2: locks (distributed execution locks)
# DB 3: Celery broker queue
# DB 4: Celery result backend
# DB 5: rate limiting
# DB 6: idempotency dedup
