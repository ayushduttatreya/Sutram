; infra/pgbouncer/pgbouncer.ini
; NOTE: The bitnami/pgbouncer image generates its config from environment variables.
; This file is a reference only — see the pgbouncer service in docker-compose.yml
; for the active configuration. Settings here are NOT applied at runtime.
;
[databases]
sutram = host=postgres port=5432 dbname=sutram

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
log_connections = 0
log_disconnections = 0
