# pyproject.toml
[tool.uv.workspace]
members = [
    "packages/core",
    "packages/sutram-sdk",
    "services/api-gateway",
    "services/workflow-service",
    "services/memory-service",
    "services/observability-service",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["packages", "services"]

[dependency-groups]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
]
