name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_PYTHON: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
      - run: uv run ruff check packages/ services/
      - run: uv run ruff format --check packages/ services/

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
      - run: uv run mypy packages/core/sutram_core

  test-packages:
    name: Test / packages/core
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
      - run: uv run pytest packages/core/tests/ -v --tb=short

  test-workflow-service:
    name: Test / workflow-service
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
      - run: uv run pytest services/workflow-service/tests/unit/ -v --tb=short

  test-memory-service:
    name: Test / memory-service
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
      - run: uv run pytest services/memory-service/tests/unit/ -v --tb=short

  test-observability-service:
    name: Test / observability-service
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
      - run: uv run pytest services/observability-service/tests/unit/ -v --tb=short

  test-api-gateway:
    name: Test / api-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
      - run: uv run pytest services/api-gateway/tests/ -v --tb=short
